<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kia Brown's Portfolio</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Bitcount+Single:wght@100..900&family=Roboto:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <!--Page One-->
   <div id="pageOne">
    <!--topFlexbox-->
    <div id="topFlexbox" class="tFlexbox">
   <div id="dateTime"></div>
   <div id="quickInfo">
    <div id="experience">Experience: 3+ Years</div>
    <div id="location">Located: Dallas, Texas</div>
   </div>
 </div>
   <div id="nameAndTitle" class="nameContainer">
    <div class="typeWriterName">
    <h1 id="name">Hi, I'm Kia Brown</h1>
    </div>
    <h2 id="title">Web Development/Frontend Development</h2>
   </div>
   <div id="selectionsContainer" class="selectionButtons">
    <div id="portfolioButton">Portfolio</div>
    <div id="animeButton">Anime</div>
    <div id="hobbiesButton">Hobbies</div>
    <div id="gamesButton">Video Games</div>
   </div>

    <div class="carousel">
        <div class="group">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">5</div>
            <div class="card">6</div>
        </div>
            <div aria-hidden class="group">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">5</div>
            <div class="card">6</div>
        </div>
    </div>
</div>



    <!--Page Two-->
    <div id="pageTwo">
    <div id="projectTitle" class="project-title">
        <p>Projects</p>
    </div>
    <div id="proficiencyBar" class="skillsBar">
        <p>My Skills</p>


        <li><h3>HTML</h3>
            <span class="bar"><span class="html"></span>90%</span>
        </li>
         <li><h3>CSS</h3>
            <span class="bar"><span class="css"></span>80%</span>
        </li>
        <li><h3>JavaScript</h3>
            <span class="bar"><span class="javascript"></span>65%</span>
        </li>
         <li><h3>Java</h3>
            <span class="bar"><span class="java"></span>60%</span>
        </li>
         <li><h3>C++</h3>
            <span class="bar"><span class="cplusplus"></span>50%</span>
        </li>
    </div>


    <div id="projectCards"></div>
</div>




   <!--Page Three-->
   <div id="pageThree">
    <div id="gamesTitle"></div>
    <div id="gamescreen">
        <div id="gameCards"></div>
    </div>
</div>




    <!--Page Four --> 
    <div id="pagrFour">
    <div id="hobbiesTitle"></div>
    <div id="skatingContainer"></div>
    <div id="runningContainer"></div>
    <div id="keyboardContainer"></div>
</div>




    <!--Page Five-->
    <div id="pageFive">
    <div id="animeTitle"></div>
    <div id="animeCards"></div>
</div>
<script src="script.js"></script>
</body>
</html>
